services:

  # ============ WAZUH STACK ============
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.4
    container_name: wazuh-indexer
    environment:
      - INDEXER_SECURITY_SSL_HTTP_ENABLED=true
      - INDEXER_SECURITY_SSL_HTTP_PEM_CERTIFICATE_FILE=certs/node-1.pem
      - INDEXER_SECURITY_SSL_HTTP_PEM_CERTIFICATE_KEY_FILE=certs/node-1-key.pem
      - INDEXER_SECURITY_SSL_HTTP_PEM_INTERMEDIATE_CA_FILE=certs/root-ca.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEM_CERTIFICATE_FILE=certs/node-1.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEM_CERTIFICATE_KEY_FILE=certs/node-1-key.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEM_INTERMEDIATE_CA_FILE=certs/root-ca.pem
      - CLUSTER_NAME=wazuh-cluster
      - NODE_NAME=node-1
      - DISCOVERY_SEED_HOSTS=wazuh-indexer
      - CLUSTER_INITIAL_MASTER_NODES=node-1
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=false
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    ports:
      - "9200:9200"
    networks:
      - wazuh-net
    healthcheck:
      test: curl -s https://localhost:9200 -u admin:SecurePassword123! --insecure || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.4
    container_name: wazuh-manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecurePassword123!
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/certs/ca.crt
      - SSL_CERTIFICATE=/etc/ssl/certs/cert.pem
      - SSL_KEY=/etc/ssl/private/key.pem
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - wazuh-api-data:/var/ossec/api/configuration
      - wazuh-etc:/var/ossec/etc
      - wazuh-var:/var/ossec/var
    networks:
      - wazuh-net
    depends_on:
      - wazuh-indexer
    healthcheck:
      test: curl -s http://localhost:55000/manager/info -u wazuh:wazuh || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat-data:/usr/share/filebeat/data
    environment:
      - OPENSEARCH_HOST=wazuh-indexer
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=SecurePassword123!
    command: filebeat -e -strict.perms=false
    networks:
      - wazuh-net
    depends_on:
      - wazuh-indexer
    healthcheck:
      test: filebeat test config
      interval: 10s
      timeout: 5s
      retries: 5

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.4
    container_name: wazuh-dashboard
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecurePassword123!
      - WAZUH_API_URL=https://wazuh-manager
      - WAZUH_API_USERNAME=wazuh
      - WAZUH_API_PASSWORD=wazuh
    ports:
      - "5601:5601"
    networks:
      - wazuh-net
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    healthcheck:
      test: curl -s http://localhost:5601/app/wazuh || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ GRAYLOG STACK ============

  mongo:
    image: mongo:8.0
    container_name: graylog-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - graylog-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  graylog-opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: graylog-opensearch
    environment:
      - cluster.name=graylog-cluster
      - node.name=node-1
      - discovery.seed_hosts=graylog-opensearch
      - cluster.initial_master_nodes=node-1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=GraylogPassword123!
    ulimits:
      memlock: -1
    volumes:
      - graylog-opensearch-data:/usr/share/opensearch/data
    ports:
      - "9201:9200"
    networks:
      - graylog-net
    healthcheck:
      test: curl -s https://localhost:9200/_cluster/health -u admin:GraylogPassword123! --insecure || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  graylog:
    image: graylog/graylog:6.1
    container_name: graylog
    environment:
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepper1234567890123456
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=https://admin:GraylogPassword123!@graylog-opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://admin:admin@mongo:27017/graylog
      - GRAYLOG_NODE_ID_FILE=/usr/share/graylog/data/node-id
    ports:
      - "9000:9000"
      - "12201:12201/udp"
      - "1600:1600/udp"
      - "5140:5140/udp"
    volumes:
      - graylog-data:/usr/share/graylog/data
    networks:
      - graylog-net
    depends_on:
      - mongo
      - graylog-opensearch
    healthcheck:
      test: curl -s http://localhost:9000/api/system/lbstatus
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  wazuh-net:
    driver: bridge
  graylog-net:
    driver: bridge

volumes:
  # Wazuh
  wazuh-indexer-data:
  wazuh-api-data:
  wazuh-etc:
  wazuh-var:
  filebeat-data:
  # Graylog
  mongo-data:
  graylog-opensearch-data:
  graylog-data:
