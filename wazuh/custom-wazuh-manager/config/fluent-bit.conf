[SERVICE]
    Daemon Off
    Flush 1
    Log_Level info
    Parsers_File parsers.conf
    HTTP_Server On
    HTTP_Listen 0.0.0.0
    HTTP_Port 2020
    Health_Check On

[INPUT]
    Name tail
    Path /var/log/containers/*.log
    Parser docker
    Tag docker.*
    Refresh_Interval 5
    Mem_Buf_Limit 50MB
    Skip_Long_Lines On

[INPUT]
    Name systemd
    Tag host.*
    Path /var/log/journal
    Read_From_Tail On

[INPUT]
    Name cpu
    Tag metrics.cpu
    Interval_Sec 60

[INPUT]
    Name mem
    Tag metrics.mem
    Interval_Sec 60

[FILTER]
    Name modify
    Match docker.*
    Add source docker
    Add environment production

[FILTER]
    Name modify
    Match host.*
    Add source systemd
    Add environment production

[FILTER]
    Name nest
    Match docker.*
    Operation lift
    Nested_under log
    Add_prefix log_

[OUTPUT]
    Name es
    Match docker.*
    Host wazuh-indexer
    Port 9200
    HTTP_User admin
    HTTP_Passwd SecurePassword123!
    Logstash_Format On
    Logstash_Prefix wazuh-docker-logs
    Logstash_DateFormat %Y.%m.%d
    Type _doc
    tls On
    tls.verify Off
    Retry_Limit 5

[OUTPUT]
    Name es
    Match host.*
    Host wazuh-indexer
    Port 9200
    HTTP_User admin
    HTTP_Passwd SecurePassword123!
    Logstash_Format On
    Logstash_Prefix wazuh-host-logs
    Logstash_DateFormat %Y.%m.%d
    Type _doc
    tls On
    tls.verify Off
    Retry_Limit 5

[OUTPUT]
    Name es
    Match metrics.*
    Host wazuh-indexer
    Port 9200
    HTTP_User admin
    HTTP_Passwd SecurePassword123!
    Logstash_Format On
    Logstash_Prefix wazuh-metrics
    Logstash_DateFormat %Y.%m.%d
    Type _doc
    tls On
    tls.verify Off
    Retry_Limit 5

[OUTPUT]
    Name splunk
    Match docker.*
    Host graylog
    Port 12201
    Event_Key log
    Send_Raw On
    Event_Format json

[OUTPUT]
    Name splunk
    Match host.*
    Host graylog
    Port 12201
    Event_Key log
    Send_Raw On
    Event_Format json
